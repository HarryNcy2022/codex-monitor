name: Build and Release macOS App

# This action runs ONLY when you push a tag like "v1.0.0"
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # You can change this to your preferred version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS App with PyInstaller
        # This matches the command in your script's docstring
        run: |
          pyinstaller --windowed --onefile --noconfirm --name "CodexMonitor" codex_monitor.py

      - name: Zip the .app bundle
        # GitHub Releases cannot accept raw folders. Mac .app files are actually folders.
        # We must zip it before uploading.
        run: |
          cd dist
          zip -r CodexMonitor-macOS.zip CodexMonitor.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CodexMonitor-macOS.zip
          generate_release_notes: true